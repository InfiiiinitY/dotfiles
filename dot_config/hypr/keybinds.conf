$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, C, exec, $terminal # Open terminal
bind = $mainMod, E, exec, [float; center; size 1000 750] $fileManager # Open floating fileManager
bind = $mainMod, R, exec, $menu # Show wofi application picker
bind = $mainMod, B, exec, $browser # Open browser
bind = $mainMod, V, exec, $clipboard # Show clipboard history
bind = $mainMod SHIFT, E, exec, $emojiPicker # Show emojiPicker
bind = $mainMod, F12, exec, [float; move (monitor_w-350) (70)] $calculator # Open Calculator on Win + F12 but floating and moved to the top right
bind = $mainMod, W, exec, bash /usr/local/bin/set_wallpaper.sh # Change the background to a random one
bind = $mainMod, Q, killactive # Close the active window
bind = $mainMod, F, fullscreen # Toggle active windows fullscreen
bind = $mainMod SHIFT, F, togglefloating # Toggle active window floating
bind = $mainMod, P, pseudo # Toggle pseudo layout
bind = $mainMod SHIFT, P, pin # Pin the currently floating window
bind = $mainMod, J, togglesplit # Toggle split layout
bind = $mainMod, L, exec, hyprlock # Lock screen on Win + L
bind = $mainMod, G, hyprexpo:expo, toggle # Toggle Hyprexpo overview plugin
bind = $mainMod SHIFT, L, exit # Exit Hyprland which is basically like logging out
bind = $mainMod CTRL, 1, exec, hyprcap shot monitor:active -nw # Screenshot active monitor and safe to file
bind = $mainMod CTRL, 2, exec, hyprcap shot region -znw # Select a region to screenshot and safe to file
bind = $mainMod CTRL, 3, exec, hyprcap shot monitor:active -d 10 -nw # Screenshot active monitor in 10 seconds and safe to file
bind = $mainMod CTRL, 4, exec, wayscriber --active # Start the ZoomIt like tool "wayscriber"
bind = $mainMod CTRL, S, exec, hyprcap shot region -znc # Select a region to screenshot and copy to clipboard

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1 # Switch to workspace 1
bind = $mainMod, 2, workspace, 2 # Switch to workspace 2
bind = $mainMod, 3, workspace, 3 # Switch to workspace 3
bind = $mainMod, 4, workspace, 4 # Switch to workspace 4
bind = $mainMod, 5, workspace, 5 # Switch to workspace 5
bind = $mainMod, 6, workspace, 6 # Switch to workspace 6
bind = $mainMod, 7, workspace, 7 # Switch to workspace 7
bind = $mainMod, 8, workspace, 8 # Switch to workspace 8
bind = $mainMod, 9, workspace, 9 # Switch to workspace 9
bind = $mainMod, 0, workspace, 10 # Switch to workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move active window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move active window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move active window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move active window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move active window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move active window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move active window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move active window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move active window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move active window to workspace 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic # Toggle special workspace
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # move active window to special workspace

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1 # Scroll to previous workspace
bind = $mainMod, mouse_up, workspace, e-1 # Scroll to next workspace

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # Move window
bindm = $mainMod, mouse:273, resizewindow # Resize window

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
